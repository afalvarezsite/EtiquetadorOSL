version: "3.8"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: etiquetador-app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
    networks:
      - etiquetador-network

  nginx:
    image: nginx:alpine
    container_name: etiquetador-nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - etiquetador-network
    depends_on:
      - app

  db:
    image: mariadb:10.11
    container_name: etiquetador-db
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: rootpassword
      MARIADB_DATABASE: etiquetador
      MARIADB_USER: etiquetador
      MARIADB_PASSWORD: password
    volumes:
      - dbdata:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - etiquetador-network

networks:
  etiquetador-network:
    driver: bridge

volumes:
  dbdata:
