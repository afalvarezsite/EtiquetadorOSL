services:
  # ==============================
  # STACK NGINX (Perfil: nginx)
  # ==============================
  app-nginx:
    build:
      context: .
      dockerfile: Dockerfile.nginx
    container_name: etiquetador-app-fpm
    restart: ${RESTART_POLICY:-unless-stopped}
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
    networks:
      - etiquetador-network
    profiles:
      - nginx

  nginx:
    image: nginx:alpine
    container_name: etiquetador-nginx
    restart: ${RESTART_POLICY:-unless-stopped}
    ports:
      - "80:80"
      - "443:443" # Añadido puerto HTTPS
    volumes:
      - ./:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
      - ./certs:/etc/nginx/certs # Mapeo de certificados
    networks:
      - etiquetador-network
    depends_on:
      - app-nginx
    profiles:
      - nginx

  # ==============================
  # STACK APACHE (Perfil: apache)
  # ==============================
  app-apache:
    build:
      context: .
      dockerfile: Dockerfile.apache
    container_name: etiquetador-app-apache
    restart: ${RESTART_POLICY:-unless-stopped}
    ports:
      - "8081:80"
      - "8443:443" # Añadido puerto HTTPS para Apache (8443 para no chocar con Nginx si levantas ambos)
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
      - ./docker/apache/000-default.conf:/etc/apache2/sites-available/000-default.conf
      - ./certs:/etc/apache2/certs # Mapeo de certificados
    networks:
      - etiquetador-network
    profiles:
      - apache

  # ==============================
  # BASE DE DATOS (Compartida)
  # ==============================
  db:
    image: mariadb:10.11
    container_name: etiquetador-db
    restart: ${RESTART_POLICY:-unless-stopped}
    environment:
      MARIADB_ROOT_PASSWORD: rootpassword
      MARIADB_DATABASE: etiquetador
      MARIADB_USER: etiquetador
      MARIADB_PASSWORD: password
    volumes:
      - dbdata:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - etiquetador-network
    profiles:
      - nginx
      - apache

networks:
  etiquetador-network:
    driver: bridge

volumes:
  dbdata: {}
